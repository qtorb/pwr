[theme]
primaryColor = "#0066cc"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "auto"

[logger]
level = "info"

[server]
headless = true
enableCORS = true
enableXsrfProtection = true
port = 8501

[browser]
serverAddress = "0.0.0.0"
gatherUsageStats = false
